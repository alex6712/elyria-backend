services:
  elyria-backend:
    container_name: elyria-backend
    build: .
    environment:
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      elyria-database:
        condition: service_healthy
      elyria-redis:
        condition: service_healthy
      elyria-minio:
        condition: service_healthy
    networks:
      - elyria-application-net
    restart: unless-stopped

  elyria-database:
    image: postgres:17
    container_name: elyria-database
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - elyria-application-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  elyria-redis:
    image: redis:7-alpine
    container_name: elyria-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
    volumes:
      - redis_data:/data
    networks:
      - elyria-application-net
    command: >
      redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  elyria-minio:
    image: minio/minio
    container_name: elyria-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - elyria-application-net
    command: server --console-address ":9001" /data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 5

volumes:
  pgdata:
  redis_data:
  minio_data:

networks:
  elyria-application-net:
    driver: bridge
